version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openclaw_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  openclaw-daemon:
    image: mcr.microsoft.com/playwright:v1.40.0-jammy
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/openclaw_db
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=${API_KEY}
    volumes:
      - .:/app
      - ./browser_data:/app/browser_data
    working_dir: /app
    command: sh -c "npm install && npm start"

volumes:
  pgdata:
  redisdata:
